<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E-Paper Tag Controller</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --panel: #ffffff;
      --line: #d9dee7;
      --text: #17202a;
      --muted: #687385;
      --accent: #0f766e;
      --accent-strong: #0b5f59;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
    }

    main {
      max-width: 1040px;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(300px, 420px) 1fr;
      gap: 18px;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 650;
      color: #263241;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      padding: 8px 11px;
      min-height: 36px;
      cursor: pointer;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.primary:hover {
      background: var(--accent-strong);
    }

    button.active {
      border-color: var(--accent);
      color: var(--accent);
      background: #e8f5f3;
    }

    input[type="datetime-local"] {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 9px;
      min-height: 36px;
      width: 100%;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #a7b0bd;
    }

    .dot.on {
      background: #16a34a;
    }

    .dot.err {
      background: var(--danger);
    }

    .preview-wrap {
      display: grid;
      place-items: center;
      min-height: 290px;
    }

    .epd {
      width: min(100%, 636px);
      aspect-ratio: 212 / 104;
      background: #fdfdf8;
      border: 1px solid #2e2e2e;
      box-shadow: inset 0 0 0 4px #f2f0e8;
      display: grid;
      place-items: center;
      font-family: "Courier New", monospace;
      color: #111;
      overflow: hidden;
    }

    .screen {
      width: 92%;
      height: 82%;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 10px;
      text-align: center;
    }

    .screen .big {
      font-size: clamp(30px, 7vw, 58px);
      line-height: 0.95;
      font-weight: 700;
    }

    .screen .mid {
      font-size: clamp(18px, 3.5vw, 32px);
      font-weight: 700;
    }

    .screen .small {
      font-size: clamp(14px, 2.4vw, 22px);
      font-weight: 700;
    }

    pre {
      margin: 0;
      min-height: 190px;
      max-height: 280px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0f172a;
      color: #dbeafe;
      padding: 10px;
      font-size: 12px;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>E-Paper Tag Controller</h1>
    <span class="status"><span id="statusDot" class="dot"></span><span id="statusText">Not connected</span></span>
  </header>

  <main>
    <div class="stack">
      <section>
        <h2>BLE</h2>
        <div class="row">
          <button id="connectBtn" class="primary">Scan</button>
          <button id="reconnectBtn">Reconnect</button>
          <button id="disconnectBtn">Disconnect</button>
        </div>
      </section>

      <section>
        <h2>Layout</h2>
        <div class="row" id="layoutButtons">
          <button data-layout="0">Status</button>
          <button data-layout="1" class="active">Clock</button>
          <button data-layout="2">Calendar</button>
        </div>
      </section>

      <section>
        <h2>Time</h2>
        <div class="stack">
          <input id="dateTimeInput" type="datetime-local">
          <div class="row">
            <button id="nowBtn">Now</button>
            <button id="sendBtn" class="primary">Sync & Refresh</button>
          </div>
        </div>
      </section>
    </div>

    <div class="stack">
      <section>
        <h2>Preview 212 x 104</h2>
        <div class="preview-wrap">
          <div class="epd">
            <div id="preview" class="screen"></div>
          </div>
        </div>
      </section>

      <section>
        <h2>Log</h2>
        <pre id="log"></pre>
      </section>
    </div>
  </main>

  <script>
    const SERVICE_UUID = '18424398-7cbc-11e9-8f9e-2a86e4085a59';
    const CONTROL_UUID = '2d86686a-53dc-25b3-0c4a-f0e10c8dee20';

    let device = null;
    let characteristic = null;
    let selectedLayout = 1;

    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const logEl = document.getElementById('log');
    const dateTimeInput = document.getElementById('dateTimeInput');
    const preview = document.getElementById('preview');

    function log(message) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent = `[${time}] ${message}\n` + logEl.textContent;
    }

    function setStatus(kind, text) {
      statusDot.className = `dot ${kind || ''}`;
      statusText.textContent = text;
    }

    function toLocalInputValue(date) {
      const pad = value => String(value).padStart(2, '0');
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function dateFromInput() {
      if (!dateTimeInput.value) {
        return new Date();
      }
      return new Date(dateTimeInput.value);
    }

    function weekdayForFirmware(date) {
      const day = date.getDay();
      return day === 0 ? 7 : day;
    }

    function buildConfigPacket(layout, date) {
      const packet = new Uint8Array(16);
      packet[0] = 0x45;
      packet[1] = 0x50;
      packet[2] = 0x44;
      packet[3] = 0x31;
      packet[4] = 0x01;
      packet[5] = layout & 0xff;
      packet[6] = 0x00;
      packet[7] = weekdayForFirmware(date);
      packet[8] = Math.max(0, Math.min(99, date.getFullYear() - 2000));
      packet[9] = date.getMonth() + 1;
      packet[10] = date.getDate();
      packet[11] = date.getHours();
      packet[12] = date.getMinutes();
      packet[13] = date.getSeconds();
      packet[14] = 0x00;
      packet[15] = packet.slice(0, 15).reduce((sum, value) => (sum + value) & 0xff, 0);
      return packet;
    }

    function hex(packet) {
      return Array.from(packet).map(value => value.toString(16).padStart(2, '0')).join(' ');
    }

    function updatePreview() {
      const date = dateFromInput();
      const pad = value => String(value).padStart(2, '0');
      const time = `${pad(date.getHours())}:${pad(date.getMinutes())}`;
      const shortDate = `${pad(date.getDate())}-${pad(date.getMonth() + 1)}-${String(date.getFullYear()).slice(2)}`;
      const fullDate = `${pad(date.getDate())}-${pad(date.getMonth() + 1)}-${date.getFullYear()}`;
      const status = '29C 3.3V';

      if (selectedLayout === 0) {
        preview.innerHTML = `<div class="mid">29C</div><div class="mid">3.3V</div>`;
      } else if (selectedLayout === 2) {
        preview.innerHTML = `<div class="mid">${fullDate}</div><div class="mid">${time}</div><div class="small">${status}</div>`;
      } else {
        preview.innerHTML = `<div class="big">${time}</div><div class="small">${shortDate}</div><div class="small">${status}</div>`;
      }
    }

    async function connect() {
      if (!navigator.bluetooth) {
        setStatus('err', 'Web Bluetooth unavailable');
        log('Web Bluetooth unavailable');
        return;
      }

      device = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true,
        optionalServices: [SERVICE_UUID]
      });
      device.addEventListener('gattserverdisconnected', () => {
        characteristic = null;
        setStatus('', 'Disconnected');
        log('Disconnected');
      });
      await reconnect();
    }

    async function reconnect() {
      if (!device) {
        await connect();
        return;
      }
      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      characteristic = await service.getCharacteristic(CONTROL_UUID);
      setStatus('on', device.name || 'Connected');
      log(`Connected: ${device.name || device.id}`);
    }

    function disconnect() {
      if (device && device.gatt.connected) {
        device.gatt.disconnect();
      }
    }

    async function sendConfig() {
      if (!characteristic) {
        await reconnect();
      }
      const packet = buildConfigPacket(selectedLayout, dateFromInput());
      if (characteristic.writeValueWithResponse) {
        await characteristic.writeValueWithResponse(packet);
      } else {
        await characteristic.writeValue(packet);
      }
      log(`TX ${hex(packet)}`);
      log('Firmware will disconnect, then refresh the display');
    }

    document.getElementById('connectBtn').addEventListener('click', () => connect().catch(err => log(err.message)));
    document.getElementById('reconnectBtn').addEventListener('click', () => reconnect().catch(err => log(err.message)));
    document.getElementById('disconnectBtn').addEventListener('click', disconnect);
    document.getElementById('nowBtn').addEventListener('click', () => {
      dateTimeInput.value = toLocalInputValue(new Date());
      updatePreview();
    });
    document.getElementById('sendBtn').addEventListener('click', () => sendConfig().catch(err => {
      setStatus('err', 'Send failed');
      log(err.message);
    }));
    document.getElementById('layoutButtons').addEventListener('click', event => {
      const button = event.target.closest('button[data-layout]');
      if (!button) return;
      selectedLayout = Number(button.dataset.layout);
      document.querySelectorAll('#layoutButtons button').forEach(item => item.classList.toggle('active', item === button));
      updatePreview();
    });
    dateTimeInput.addEventListener('input', updatePreview);

    dateTimeInput.value = toLocalInputValue(new Date());
    updatePreview();
  </script>
</body>
</html>
